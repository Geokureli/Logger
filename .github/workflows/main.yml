name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  repository_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  build:
    # strategy:
    #   matrix:
    #     haxe-version: ["4.3.6"]
    #   fail-fast: false
    # runs-on: ubuntu-latest
    runs-on: macos-13
    steps:
    # - run: sudo apt-get update
    
    - uses: actions/checkout@v4
    
    - uses: krdlab/setup-haxe@v1
      with:
        # haxe-version: ${{matrix.haxe-version}}
        haxe-version: "4.3.7"
    
    - name: Set HAXEPATH
      run: |
        echo "HAXEPATH=$HAXE_STD_PATH/.." >> $GITHUB_ENV
    
    - name: Install haxe libs
      shell: bash
      id: prerequisites
      run: |
        haxelib install utest

    - name: Build test
      run: |
        echo "Building test"
        haxe -cp tests/bare/src -cp lib -D analyzer-optimize -main Main --interp
    
    - name: Build test
      run: |
        echo "Building test"
        haxe -cp tests/bare/src -cp lib -D analyzer-optimize -main Main --interp